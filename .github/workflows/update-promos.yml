name: Update promo data

on:
  workflow_dispatch:
  schedule:
    - cron: "10 5 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Import latest promos
        run: node tools/import-promos.mjs

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update promo data"
          file_pattern: data/deals.json data/source-report.json
